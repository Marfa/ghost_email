name: Weekly digest

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - run: npm ci
      - run: npm test
      - run: npm run build
      - run: npm run digest
        env:
          GHOST_URL: ${{ secrets.GHOST_URL }}
          GHOST_ADMIN_API_KEY: ${{ secrets.GHOST_ADMIN_API_KEY }}

      - uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: 'chore: update digest last-run timestamp'
          file_pattern: state/last-run.json
